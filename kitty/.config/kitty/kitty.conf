# =========================
# Kitty - Dark Red Setup
# =========================

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# Cursor
cursor_shape block
cursor_blink_interval 0.5

# Window
window_padding_width 10
background_opacity 0.88
dynamic_background_opacity yes

# Scrollback
scrollback_lines 10000
wheel_scroll_multiplier 3.0

# Mouse
copy_on_select yes
strip_trailing_spaces smart

# Confirm close only when multiple windows/tabs exist
confirm_os_window_close 0

# Bell
enable_audio_bell no
visual_bell_duration 0.0

# =========================
# Colors - Black / Red
# =========================

foreground #f8f8f2
background #050505
selection_foreground #050505
selection_background #ff5555

cursor #ff3333
cursor_text_color #050505

url_color #ff5555

# Black
color0  #090909
color8  #4a4a4a

# Red
color1  #ff3333
color9  #ff5555

# Green
color2  #50fa7b
color10 #69ff94

# Yellow
color3  #f1fa8c
color11 #ffffa5

# Blue
color4  #6272a4
color12 #8be9fd

# Magenta
color5  #bd93f9
color13 #ff79c6

# Cyan
color6  #8be9fd
color14 #a4ffff

# White
color7  #f8f8f2
color15 #ffffff

# =========================
# Tabs
# =========================

tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
active_tab_foreground #050505
active_tab_background #ff3333
inactive_tab_foreground #f8f8f2
inactive_tab_background #1a1a1a

# =========================
# Keybinds
# =========================

map ctrl+shift+enter new_window
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab

map ctrl+shift+plus change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0
